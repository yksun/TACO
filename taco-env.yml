name: taco
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - pip
  # Assemblers
  # canu needs a working Java runtime — openjdk must be listed explicitly
  # to prevent the "undefined symbol: JLI_StringDup" error from bioconda builds.
  # If canu still fails (e.g. you get a dev build), install the stable binary
  # from https://github.com/marbl/canu/releases and place it on PATH.
  - openjdk>=11
  - canu=2.2
  - nextdenovo>=2.5
  - flye>=2.9
  - hifiasm>=0.19
  - peregrine-2021
  - pbipa
  - snakemake>=7,<8  # IPA requires Snakemake 7; v8 removed --reason flag
  # Additional assemblers for broader comparison
  - lja               # La Jolla Assembler (HiFi-only, very contiguous)
  - raven>=1.8        # Fast OLC assembler (all long-read platforms)
  # MBG (Multiplex de Bruijn Graph, HiFi-only) — install manually if needed:
  #   git clone https://github.com/maickrau/MBG && cd MBG && make
  # Analysis tools
  - busco>=5.4
  - quast>=5.2
  - minimap2>=2.24
  - seqtk>=1.3
  - bwa>=0.7
  - samtools>=1.15
  # Contig merging (telomere-aware validated merge in Step 10)
  # quickmerge provides merge_wrapper.py used by Step 10
  - quickmerge
  # Post-assembly haplotig/duplicate purging (Step 12)
  - purge_dups
  # Polishing (auto-selected by --platform in Step 12)
  - nextpolish2
  - yak
  - racon
  - medaka
  # Download tools (used by pipeline.py for --external FASTA fetching)
  - curl
  - wget
  # Optional (Merqury k-mer QV scoring)
  - merqury
  - meryl
  # Optional (telomere repeat discovery)
  # - tidk
  - pip:
    - -e .
