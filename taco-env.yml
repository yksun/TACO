name: taco
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.8
  - pip
  # Assemblers
  - canu>=2.2
  - nextdenovo>=2.5
  - flye>=2.9
  - hifiasm>=0.19
  - peregrine-2021
  - pbipa
  # Analysis tools
  - busco>=5.4
  - quast>=5.2
  - minimap2>=2.24
  - seqtk>=1.3
  - funannotate>=1.8
  - bwa>=0.7
  - samtools>=1.15
  # Optional (Merqury k-mer QV scoring)
  - merqury
  - meryl
  # Optional (telomere repeat discovery)
  # - tidk
  - pip:
    - -e .
